<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Homepage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="./homepage.css" />
  </head>
  <body>
    <header>
      <!-- sezione bottoni in alto -->
      <div class="container">
        <!-- Bottoni in alto -->
        <div class="row">
          <div class="col-12">
            <a href="#">Tutto</a>
            <a href="#">Musica</a>
            <a href="#">Podcast</a>
          </div>
        </div>
      </div>
      <!-- Consigli -->
    </header>

    <main>
      <div class="container">
        <div id="consigliati" class="row row-cols-2 row-cols-md-2 row-cols-lg-4"></div>
      </div>

      <!-- Sezione caroselli  -->
      <div class="container-fluid p-0">
        <!-- sezione Creato pe te -->
        <div class="row row-cols-2 justify-content-between mb-3 mx-0 px-3">
          <div class="col p-0">
            <h6 class="mb-0 p-0">creato per <br /><span>Gianni</span></h6>
          </div>
          <div class="col text-end align-self-end p-0">
            <h6 class="mb-0">Mostra Tutto</h6>
          </div>
        </div>

        <!-- creato per te carosello -->
        <div class="row position-relative m-0">
          <!-- INIZIO CAROSELLO -->
          <div
            id="per-te-carousel"
            class="p-0 smooth-carousel m-0 row row-cols-1 row-cols-sm-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-3 row-cols-xxl-5 flex-nowrap overflow-auto hiding-bar"></div>
          <!-- BUTTONS -->
          <span
            onclick="rightMovement(0)"
            style="width: 5%"
            class="end-0 p-0 position-absolute top-0 text-end h-100 d-flex justify-content-center align-items-center arrow-right">
            <i class="bi bi-arrow-right-circle-fill"></i>
          </span>
          <span
            onclick="leftMovement(0)"
            style="width: 5%"
            class="start-0 p-0 position-absolute top-0 text-end h-100 d-flex justify-content-center align-items-center arrow-left">
            <i class="bi bi-arrow-left-circle-fill"></i>
          </span>
        </div>

        <!-- I tuoi artisti preferiti -->
        <div class="row row-cols-2 justify-content-between mx-0 my-3 px-3">
          <div class="col p-0">
            <h6 class="mb-0 p-0">i tuoi artisti <br /><span>Preferiti</span></h6>
          </div>
          <div class="col text-end align-self-end p-0">
            <h6 class="mb-0">Mostra Tutto</h6>
          </div>
        </div>
        <!-- sezione i tuoi artisti preferiti -->
        <!-- i tuoi artisti preferiti carosello -->
        <div class="row position-relative m-0">
          <!-- INIZIO CAROSELLO -->
          <div
            id="artisti-carousel"
            class="p-0 smooth-carousel m-0 row row-cols-1 row-cols-sm-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-3 row-cols-xxl-5 flex-nowrap overflow-auto hiding-bar"></div>
          <!-- BUTTONS -->
          <span
            onclick="rightMovement(1)"
            style="width: 5%"
            class="end-0 p-0 position-absolute top-0 text-end h-100 d-flex justify-content-center align-items-center arrow-right">
            <i class="bi bi-arrow-right-circle-fill"></i>
          </span>
          <span
            onclick="leftMovement(1)"
            style="width: 5%"
            class="start-0 p-0 position-absolute top-0 text-end h-100 d-flex justify-content-center align-items-center arrow-left">
            <i class="bi bi-arrow-left-circle-fill"></i>
          </span>
        </div>
      </div>
      <!-- Sezione Video-->
      <div class="container-fluid my-5">
        <div id="video-row" class="row row-cols-1 row-cols-md-2 row-cols-xl-3"></div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="./homepage.js"></script>
  </body>
</html>
